# =============================================================================
# restore-prod.yaml  —  Restauración de las 3 BDs desde backups-pvc (grupo4-prod)
#
# Espejo de restore-qa.yaml para el entorno productivo. Ver comentarios allí.
# -----------------------------------------------------------------------------
# Uso:
#   kubectl -n grupo4-prod delete job restore-postgres --ignore-not-found
#   kubectl apply -f k8s/restore/restore-prod.yaml
#   kubectl -n grupo4-prod logs -f job/restore-postgres
# =============================================================================
apiVersion: batch/v1
kind: Job
metadata:
  name: restore-postgres
  namespace: grupo4-prod
  labels:
    app: restore-postgres
    app.kubernetes.io/part-of: smartgrid
    app.kubernetes.io/managed-by: grupo4
    entorno: prod
spec:
  backoffLimit: 1
  activeDeadlineSeconds: 600
  ttlSecondsAfterFinished: 1800
  template:
    metadata:
      labels:
        app: restore-postgres
        app.kubernetes.io/part-of: smartgrid
        entorno: prod
    spec:
      restartPolicy: Never
      containers:
        - name: restore
          image: postgres:15-alpine
          env:
            - name: POSTGRES_USER
              valueFrom: { secretKeyRef: { name: smartgrid-secrets, key: POSTGRES_USER } }
            - name: PGPASSWORD
              valueFrom: { secretKeyRef: { name: smartgrid-secrets, key: POSTGRES_PASSWORD } }
            - name: SNAPSHOT           # vacío = usar /backups/ULTIMO
              value: ""
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              SNAP="${SNAPSHOT:-$(cat /backups/ULTIMO 2>/dev/null || true)}"
              if [ -z "$SNAP" ] || [ ! -d "/backups/$SNAP" ]; then
                echo "[restore] ERROR: no hay respaldo disponible (SNAPSHOT='$SNAP')"
                echo "[restore] respaldos presentes:"; ls -1 /backups || true
                exit 1
              fi
              echo "[restore] usando respaldo: $SNAP"
              for PAR in "db1 solicitudes" "db2 capacidad" "db3 facturacion"; do
                set -- $PAR; HOST=$1; DB=$2
                F="/backups/$SNAP/$HOST-$DB.sql.gz"
                if [ ! -f "$F" ]; then
                  echo "[restore] ERROR: no existe $F"; exit 1
                fi
                echo "[restore] esperando a que $HOST acepte conexiones..."
                until pg_isready -h "$HOST" -U "$POSTGRES_USER" -d "$DB" -t 3 >/dev/null 2>&1; do
                  sleep 3
                done
                echo "[restore] restaurando $HOST/$DB desde $F"
                gunzip -c "$F" | psql -h "$HOST" -U "$POSTGRES_USER" -d "$DB" -v ON_ERROR_STOP=1 -q
                echo "[restore] OK $HOST/$DB"
              done
              echo "[restore] RESTAURACION COMPLETA (respaldo $SNAP)"
          volumeMounts:
            - name: backups
              mountPath: /backups
              readOnly: true
          resources:
            requests: { cpu: 25m, memory: 32Mi }
            limits:   { cpu: 200m, memory: 128Mi }
      volumes:
        - name: backups
          persistentVolumeClaim:
            claimName: backups-pvc
