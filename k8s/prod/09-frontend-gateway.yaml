# =============================================================================
# 09-frontend-gateway.yaml  (namespace grupo4-prod)
#   - API Gateway: proxy /api/ -> http://service1-api:3001/
# -----------------------------------------------------------------------------
# Verificar:
#   kubectl get pods,svc -n grupo4-prod -l app=frontend-gateway
#   kubectl exec -n grupo4-prod deploy/frontend-gateway -- wget -qO- localhost/health
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-gateway
  namespace: grupo4-prod
  labels:
    app: frontend-gateway
    app.kubernetes.io/part-of: smartgrid
    app.kubernetes.io/managed-by: grupo4
    entorno: prod
spec:
  replicas: 1
  selector:
    matchLabels: { app: frontend-gateway }
  template:
    metadata:
      labels:
        app: frontend-gateway
        app.kubernetes.io/part-of: smartgrid
        entorno: prod
    spec:
      containers:
        - name: frontend-gateway
          image: ghcr.io/lucas-vfo/smartgrid-frontend-gateway:prod
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet: { path: /health, port: 80 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: 80 }
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests: { cpu: 25m, memory: 32Mi }
            limits:   { cpu: 150m, memory: 64Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-gateway
  namespace: grupo4-prod
  labels: { app: frontend-gateway, app.kubernetes.io/part-of: smartgrid, entorno: prod }
spec:
  type: ClusterIP
  selector: { app: frontend-gateway }
  ports:
    - port: 80
      targetPort: 80
