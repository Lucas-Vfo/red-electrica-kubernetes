# =============================================================================
# 04-db3.yaml  (namespace grupo4-prod)  —  Base de datos del Servicio 3
# Facturación de sesiones activas. Init: ConfigMap db3-init
# (copia de database/init-tarifador.sql).
# -----------------------------------------------------------------------------
# Verificar:
#   kubectl get pvc,pods,svc -n grupo4-prod -l app=db3
#   kubectl exec -n grupo4-prod deploy/db3 -- psql -U smartgrid -d facturacion \
#       -c "SELECT * FROM facturacion_servicios ORDER BY timestamp_inicio DESC LIMIT 5;"
# =============================================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: db3-pvc
  namespace: grupo4-prod
  labels: { app: db3, app.kubernetes.io/part-of: smartgrid, entorno: prod }
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: local-path
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: db3
  namespace: grupo4-prod
  labels:
    app: db3
    app.kubernetes.io/part-of: smartgrid
    app.kubernetes.io/managed-by: grupo4
    entorno: prod
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels: { app: db3 }
  template:
    metadata:
      labels:
        app: db3
        app.kubernetes.io/part-of: smartgrid
        entorno: prod
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom: { secretKeyRef: { name: smartgrid-secrets, key: POSTGRES_USER } }
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: smartgrid-secrets, key: POSTGRES_PASSWORD } }
            - name: POSTGRES_DB
              value: facturacion
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: datos
              mountPath: /var/lib/postgresql/data
            - name: init-sql
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
          readinessProbe:
            exec: { command: ["sh","-c","pg_isready -U $POSTGRES_USER -d facturacion"] }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec: { command: ["sh","-c","pg_isready -U $POSTGRES_USER -d facturacion"] }
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits:   { cpu: 300m, memory: 256Mi }
      volumes:
        - name: datos
          persistentVolumeClaim:
            claimName: db3-pvc
        - name: init-sql
          configMap:
            name: db3-init
---
apiVersion: v1
kind: Service
metadata:
  name: db3
  namespace: grupo4-prod
  labels: { app: db3, app.kubernetes.io/part-of: smartgrid, entorno: prod }
spec:
  type: ClusterIP
  selector: { app: db3 }
  ports:
    - port: 5432
      targetPort: 5432
