# =============================================================================
# 04-db3.yaml  (namespace grupo4-qa)  —  Base de datos del Servicio 3
# AISLAMIENTO: sólo el Servicio 3 conoce el host "db3".
# PROD: cambiar namespace -> grupo4-prod.
# Verificar: kubectl exec -n grupo4-qa deploy/db3 -- pg_isready -U smartgrid -d facturacion
# =============================================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: db3-pvc
  namespace: grupo4-qa
  labels: { app: db3, app.kubernetes.io/part-of: smartgrid, entorno: qa }
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: local-path
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: db3
  namespace: grupo4-qa
  labels:
    app: db3
    app.kubernetes.io/part-of: smartgrid
    app.kubernetes.io/managed-by: grupo4
    entorno: qa
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels: { app: db3 }
  template:
    metadata:
      labels:
        app: db3
        app.kubernetes.io/part-of: smartgrid
        entorno: qa
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom: { secretKeyRef: { name: smartgrid-secrets, key: POSTGRES_USER } }
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: smartgrid-secrets, key: POSTGRES_PASSWORD } }
            - name: POSTGRES_DB
              value: facturacion
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: datos
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec: { command: ["sh","-c","pg_isready -U $POSTGRES_USER -d facturacion"] }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec: { command: ["sh","-c","pg_isready -U $POSTGRES_USER -d facturacion"] }
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits:   { cpu: 250m, memory: 256Mi }
      volumes:
        - name: datos
          persistentVolumeClaim:
            claimName: db3-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: db3
  namespace: grupo4-qa
  labels: { app: db3, app.kubernetes.io/part-of: smartgrid, entorno: qa }
spec:
  type: ClusterIP
  selector: { app: db3 }
  ports:
    - port: 5432
      targetPort: 5432
