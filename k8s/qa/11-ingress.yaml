# =============================================================================
# 11-ingress.yaml  (namespace grupo4-qa)  —  Ingress Traefik
# Acceso por NOMBRE DE DOMINIO (regla: prohibido NodePort / IP:puerto).
# Traefik es el Ingress Controller por defecto de K3s.
# Todo el tráfico de qa.grupo4.uta.cl entra y se enruta al Service "gateway".
#
# PROD: cambiar  namespace -> grupo4-prod  y  host -> prod.grupo4.uta.cl
# -----------------------------------------------------------------------------
# Verificar:
#   kubectl get ingress -n grupo4-qa
#   kubectl describe ingress smartgrid-ingress -n grupo4-qa
#   curl -H "Host: qa.grupo4.uta.cl" http://146.83.102.23/
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: smartgrid-ingress
  namespace: grupo4-qa
  labels:
    app.kubernetes.io/part-of: smartgrid
    app.kubernetes.io/managed-by: grupo4
    entorno: qa
  annotations:
    # Entrypoint HTTP de Traefik en K3s. (Compatibilidad con versiones que aún
    # leen la anotación de clase; lo principal es spec.ingressClassName.)
    kubernetes.io/ingress.class: traefik
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
    - host: qa.grupo4.uta.cl
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gateway
                port:
                  number: 80
