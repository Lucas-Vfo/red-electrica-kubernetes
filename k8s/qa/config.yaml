# =============================================================================
# config.yaml  (namespace grupo4-qa)
# Secret con credenciales + ConfigMap con parámetros no sensibles.
# PROD: cambiar "namespace: grupo4-qa" -> "grupo4-prod" y usar contraseñas
#       distintas y fuertes en el Secret.
# -----------------------------------------------------------------------------
# Verificar:
#   kubectl get secret,configmap -n grupo4-qa
#   kubectl describe secret smartgrid-secrets -n grupo4-qa
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: smartgrid-secrets
  namespace: grupo4-qa
  labels:
    app.kubernetes.io/part-of: smartgrid
    app.kubernetes.io/managed-by: grupo4
    entorno: qa
type: Opaque
stringData:
  POSTGRES_USER: smartgrid
  POSTGRES_PASSWORD: "qa_CAMBIAR_esta_clave_2026"     # PROD: usar otra clave fuerte
  RABBITMQ_DEFAULT_USER: smartgrid
  RABBITMQ_DEFAULT_PASS: "qa_CAMBIAR_esta_clave_2026" # PROD: usar otra clave fuerte
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: smartgrid-config
  namespace: grupo4-qa
  labels:
    app.kubernetes.io/part-of: smartgrid
    app.kubernetes.io/managed-by: grupo4
    entorno: qa
data:
  # Hosts internos (nombres de los Services ClusterIP) y puertos comunes.
  RABBITMQ_HOST: "rabbitmq"
  RABBITMQ_PORT: "5672"
  DB_PORT: "5432"
