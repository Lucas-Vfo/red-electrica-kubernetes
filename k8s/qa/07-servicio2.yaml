# =============================================================================
# 07-servicio2.yaml  (namespace grupo4-qa)  —  Servicio 2: Control de Capacidad
# Event Driven (:3002). Consume "solicitud.creada", publica "carga.aprobada".
# Sólo usa db2.  PROD: namespace -> grupo4-prod ; imagen :qa -> :prod.
# Verificar: kubectl logs -n grupo4-qa deploy/servicio2
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: servicio2
  namespace: grupo4-qa
  labels:
    app: servicio2
    app.kubernetes.io/part-of: smartgrid
    app.kubernetes.io/managed-by: grupo4
    entorno: qa
spec:
  replicas: 1
  selector:
    matchLabels: { app: servicio2 }
  template:
    metadata:
      labels:
        app: servicio2
        app.kubernetes.io/part-of: smartgrid
        entorno: qa
    spec:
      containers:
        - name: servicio2
          image: ghcr.io/grupo4/smartgrid-servicio2:qa
          imagePullPolicy: Always
          ports:
            - containerPort: 3002
          env:
            - { name: DB_HOST, value: "db2" }
            - { name: DB_NAME, value: "capacidad" }
            - name: DB_PORT
              valueFrom: { configMapKeyRef: { name: smartgrid-config, key: DB_PORT } }
            - name: DB_USER
              valueFrom: { secretKeyRef: { name: smartgrid-secrets, key: POSTGRES_USER } }
            - name: DB_PASSWORD
              valueFrom: { secretKeyRef: { name: smartgrid-secrets, key: POSTGRES_PASSWORD } }
            - name: RABBITMQ_HOST
              valueFrom: { configMapKeyRef: { name: smartgrid-config, key: RABBITMQ_HOST } }
            - name: RABBITMQ_PORT
              valueFrom: { configMapKeyRef: { name: smartgrid-config, key: RABBITMQ_PORT } }
            - name: RABBITMQ_USER
              valueFrom: { secretKeyRef: { name: smartgrid-secrets, key: RABBITMQ_DEFAULT_USER } }
            - name: RABBITMQ_PASSWORD
              valueFrom: { secretKeyRef: { name: smartgrid-secrets, key: RABBITMQ_DEFAULT_PASS } }
          readinessProbe:
            tcpSocket: { port: 3002 }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket: { port: 3002 }
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits:   { cpu: 200m, memory: 128Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: servicio2
  namespace: grupo4-qa
  labels: { app: servicio2, app.kubernetes.io/part-of: smartgrid, entorno: qa }
spec:
  type: ClusterIP
  selector: { app: servicio2 }
  ports:
    - port: 3002
      targetPort: 3002
